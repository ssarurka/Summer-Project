<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Hours</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <nav>
            <ul>
                <li><button class="nav-btn" id="homeBtn">Home</button></li>
                <li><button class="nav-btn" id="faqBtn">FAQ Posts</button></li>
                <li><button class="nav-btn" id="feedbackBtn">Feedback</button></li>
                <li class="nav-settings"><button class="nav-btn" id="settingsBtn">Settings</button></li>
            </ul>            
        </nav>
        <main>
            <header>
                <div class="top-bar">
                    <button id="signOutBtn">Sign Out</button>
                </div>
            </header>
            <header>
                <h1>FAQ Posts</h1>
            </header>
            <div class="scroll-zone">
                <h2 class="section-title">New FAQ</h2>
                <div class="new-faq-container">
                    <textarea class="faq-input" id="faqInput" placeholder="Begin typing FAQ post here..."></textarea>
                    <div class="post-btn-wrapper">
                        <button class="post-btn" id="postBtn">POST</button>
                    </div>
                </div>
                <h2 class="section-title">Recent FAQ</h2>
                <div class="recent-faq-container"></div>
            </div>
        </main>
    </div>
    <script src="ta.js"></script>
</body>
</html>
