<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Hours</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <button class="menu_btn" id="menuBtn">☰</button>
        <nav id="navBar">
            <ul>
                <li><button class="nav_btn" id="homeBtn">Home</button></li>
                <li><button class="nav_btn" id="faqBtn">FAQ Posts</button></li>
                <li><button class="nav_btn" id="feedbackBtn">Feedback</button></li>
                <li class="nav_settings"><button class="nav_btn" id="settingsBtn">Settings</button></li>
            </ul>            
        </nav>
        <main>
            <header>
                <div class="top_bar">
                    <button id="signOutBtn">Sign Out</button>
                </div>
            </header>
            <div class="container">
                <div class="circle_graph_container">
                    <div class="outer_circle" id="waitTimeCircle" style="--percentage: 0%;">
                        <div class="inner_circle">
                            <span class="number" id="waitTimeValue">0:00</span>
                            <span class="label">projected<br>wait time</span>
                        </div>
                    </div>
                </div> 
                <div class="circle_graph_container">
                    <div class="outer_circle" id="studentCountCircle" style="--percentage: 0%;">
                        <div class="inner_circle">
                            <span class="number" id="studentCountValue">0</span>
                            <span class="label">students<br>in line</span>
                        </div>
                    </div>
                </div> 
                <header class="class_header">
                    <h1>"Class" Office Hours</h1>
                </header>
            </div>
            <h2>Current Line</h2>
            <div class="scroll_zone">
                <div class="line_container" id="queueCardsContainer"></div>
            </div>
        </main>    
    </div>
    <script>
        const BACKEND_URL = "http://127.0.0.1:5000";
        async function loadDashboardData() {
            const response = await fetch(`${BACKEND_URL}/queueData`);
            const data = await response.json();
            if (data.success) {
                document.getElementById("waitTimeValue").innerText = data.projectedWaitTime;
                document.getElementById("studentCountValue").innerText = data.studentsInLine;
                const countPercent = Math.min((data.studentsInLine / 12) * 100, 100);
                document.getElementById("studentCountCircle").style.setProperty('--percentage', `${countPercent}%`);
                document.getElementById("waitTimeCircle").style.setProperty('--percentage', `${countPercent}%`);
                const container = document.getElementById("queueCardsContainer");
                container.innerHTML = "";
                data.queue.forEach(item => {
                    const cardHTML = `
                        <div class="line_spot">
                            <div class="line_header">
                                <span class="line_number">#${item.queue_number}</span>
                                <span class="line_name">${item.username}</span>
                            </div>
                            <p class="line_body">${item.help_request}</p>
                            <div class="line_footer">
                                <button class="remove_btn" onclick="removeStudent(${item.queue_number})">REMOVE</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });
            }
        }
        async function removeStudent(queueNumber) {
            const response = await fetch(`${BACKEND_URL}/removeFromQueue`, {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ queueNumber: queueNumber })
            });
            const data = await response.json();
            
            if (data.success) {
                loadDashboardData();
            } else {
                alert(data.message);
            }
        }
        window.onload = loadDashboardData;
    </script>
</body>
</html>
