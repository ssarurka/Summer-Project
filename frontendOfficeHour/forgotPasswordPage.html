<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Create Account </title>
        <link rel="stylesheet" href="loginCreatePage.css">
        <script src="forgotPasswordPage.js" defer></script>
    </head>
    <body>
        <div class = "upperReset">
            <p style="font-size: 40px ; font-weight: bold;"> Reset Password </p>
        </div>
        <div class = "centerReset">
            <div class = "userResetPassInfo">
                <div class="inputRow" id ="createAccountForm">
                    <label for="emailReset"> Purdue email: </label>
                    <input type="text" id="emailReset" name="email" placeholder="Enter your Purdue email" required>
                </div>

                <div class="inputRow">
                    <label for="usernameReset"> Username: </label>
                    <input type="text" id="usernameReset" name="username" placeholder="Enter a username" required>
                </div>
                <div class="inputRow">
                    <label for="passwordReset"> New Password: </label>
                    <input type="text" id="passwordReset" name="password" placeholder="Enter new Password" required>
                </div>
                <div class="inputRow">
                    <label for="passwordConReset"> Confirm Password: </label>
                    <input type="text" id="passwordConReset" name="password" placeholder="Confirm new Password" required>
                 </div>
                <div class = "bottom"> 
                    <button type="button" id="submitReset"> Submit </button>
                    <a href= "loginPage.html" id="creBack"> Back</a>
                </div>
            </div>
        </div>

    </body>
</html>
