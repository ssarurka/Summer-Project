<!DOCTYPE html>
<html>
    <head>
        <title> Office Hours TA info </title>
        <link rel="stylesheet" href="taInfo.css">
        <script src="script.js"></script>
    </head>
    <body>
        <div id="sideNav" class="side-nav">
            <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">&times;</a>
            <a href="#">Home</a>
            <a href="../classes.html">Classes</a>
            <a href="#">Notifications</a>
            <a href="#">FAQ</a>
        </div>

        <div class="navBar">
            <span id="menuBtn"
                class="menu-icon"
                style="font-size:30px;cursor:pointer"
                onclick="openNav()">&#9776;</span>
        </div>

        <div class = "top"> 
            <input type="text" placeholder="Search Class...">  
        </div>
        <div class = "boxes"> 
            <div class = "leftPanel"> 
                <button class = "checkButton" type="button"> CHECKIN/OUT</button>
                <div class = "timeTable"> 
                   <h3>CS240 TIME TABLE</h3>
                   <div class="tableContainer">
                        <table id="timeTable" class="time-table">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Location</th>
                                    <th>Status</th>
                                </tr>
                            </thead>

                            <tbody id="timeTableBody">
                                <!-- Rows will be added here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class = "centerPanel">
                <div class = "taNameSquare" > TA NAMES </div>
                <div class = "updateCircle"> 
                    <div class = "outerCircle">
                        <div class="innerCircle">
                            <span class="label">Line #</span>
                            <span class="number">12</span>
                        </div>
                    </div>
                    <div class="outerCircle">
                        <div class="innerCircle">
                            <span class="label">Wait Time</span>
                            <span class="number">15</span>
                        </div>
                    </div>
                </div>

            </div>
            <div class = "taReviewSquare" > TA Reviews </div>
        </div>
    </body>
</html>
