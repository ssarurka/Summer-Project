<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Login Page </title>
        <link rel="stylesheet" href="loginCreatePage.css">
        <script src="loginPage.js" defer></script>
    </head>
    <body>
        <div class = "upper">
            <p style="font-size: 40px ; font-weight: bold;"> Welcome </p>
        </div>
        <div class = "center">
            <div class = "userInfo">
                <div class="inputRow">
                    <label for="usernameLog"> Username: </label>
                    <input type="text" id="usernameLog" name="username" placeholder="Enter your username" required>
                </div>
                <div class="inputRow">
                    <label for="passwordLog"> Password: </label>
                    <input type="password" id="passwordLog" name="password" placeholder="Enter your Password" required>
                </div>
                <div class = "bottom"> 
                    <button type="button" id="submitLog"> Enter </button>
                    <a href= "createPage.html" id="enterBtn"> Create Account</a>
                    <a href="forgotPasswordPage.html" id="forgotPassBtn"> Reset Password</a>
                </div>
            </div>
        </div>

    </body>
</html>
